name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)run the release for, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency: release

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: resolve_tag
        run: |
          echo "tag=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        id: checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.resolve_tag.outputs.tag }}
          fetch-depth: 0 # full history required for git-cliff
          fetch-tags: true
          show-progress: true

      - name: Install Rust
        id: install_rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        id: rust_cache
        uses: Swatinem/rust-cache@v2

      - name: Install git-cliff
        id: install_git_cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Test
        id: test
        run: |
          cargo test --all-features --workspace

      - name: Publish to crates.io
        id: publish_crate
        run: |
          cargo publish --token ${{ secrets.CRATES_API_KEY }}

      - name: Generate changelog for this tag
        id: changelog
        run: |
          git-cliff --current --strip header -o RELEASE_NOTES.md

      - name: Create GitHub Release
        id: github_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          body_path: RELEASE_NOTES.md

      - name: Update develop from master
        id: update_develop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "ci@pilgrimagesoftware.com"
          git config --global user.name "Pilgrimage Software CI"
          git checkout develop
          git merge origin/master
          git push origin develop
