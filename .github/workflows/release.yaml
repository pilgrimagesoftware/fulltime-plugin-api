name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)run the release for, e.g. v0.1.0"
        required: true
        type: string

jobs:
  release:
    uses: pilgrimagesoftware/github-actions/.github/workflows/rust-release.yaml@master
    with:
      tag: ${{ inputs.tag }}
      test-args: "--all-features --workspace"
      trusted-publishing: false
      merge-back-branch: develop
    secrets: inherit
